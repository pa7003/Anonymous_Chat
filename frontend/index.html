<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anonymous Random Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-900 text-white min-h-screen flex flex-col font-sans">

    <!-- Header -->
    <header class="bg-gray-800 p-4 shadow-md flex justify-between items-center z-10">
        <h1 class="text-xl font-bold bg-gradient-to-r from-blue-400 to-purple-500 bg-clip-text text-transparent">
            RandChat <i class="fa-solid fa-bolt ml-1"></i>
        </h1>
        <div id="status-indicator" class="flex items-center text-sm font-medium text-gray-400">
            <span class="w-3 h-3 rounded-full bg-gray-500 mr-2" id="status-dot"></span>
            <span id="status-text">Disconnected</span>
        </div>
    </header>

    <!-- Main Content Area -->
    <main class="flex-1 overflow-hidden relative" id="app-container">
        
        <!-- View 1: Landing / Start -->
        <div id="landing-view" class="absolute inset-0 flex flex-col items-center justify-center p-6 text-center transition-opacity duration-300">
            <div class="max-w-md w-full bg-gray-800 border border-gray-700 rounded-2xl p-8 shadow-2xl glass-panel">
                <h2 class="text-3xl font-bold mb-4">Chat Anonymously</h2>
                <p class="text-gray-400 mb-8">Meet random strangers for a one-on-one text chat. No login required. Just jump in and say hi!</p>
                <button id="btn-start" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-6 rounded-lg transition-all duration-200 transform hover:scale-[1.02] shadow-[0_0_15px_rgba(37,99,235,0.5)] flex items-center justify-center gap-2">
                    <i class="fa-solid fa-play"></i> Start Searching
                </button>
            </div>
        </div>

        <!-- View 2: Searching -->
        <div id="searching-view" class="absolute inset-0 flex flex-col items-center justify-center p-6 text-center hidden transition-opacity duration-300">
             <div class="max-w-md w-full">
                <div class="relative w-24 h-24 mx-auto mb-8">
                    <div class="absolute inset-0 border-4 border-blue-500/20 rounded-full"></div>
                    <div class="absolute inset-0 border-4 border-blue-500 rounded-full border-t-transparent animate-spin"></div>
                    <i class="fa-solid fa-satellite-dish absolute inset-0 flex items-center justify-center text-2xl text-blue-400"></i>
                </div>
                <h2 class="text-2xl font-bold mb-2 animate-pulse">Searching for a partner...</h2>
                <p class="text-gray-400 mb-8">Please wait while we find someone for you to chat with.</p>
                <button id="btn-cancel" class="bg-gray-700 hover:bg-gray-600 text-white font-semibold py-2 px-6 rounded-lg transition-colors duration-200">
                    Cancel
                </button>
            </div>
        </div>

        <!-- View 3: Chat Interface -->
        <div id="chat-view" class="absolute inset-0 flex flex-col hidden transition-opacity duration-300">
            <!-- Messages Area -->
            <div id="chat-messages" class="flex-1 overflow-y-auto p-4 space-y-4 scroll-smooth pb-20">
                <!-- Messages will be injected here -->
                <div class="text-center text-xs text-gray-500 my-4 uppercase tracking-wider font-semibold">
                    <span class="bg-gray-800 px-3 py-1 rounded-full border border-gray-700">Chat Started</span>
                </div>
            </div>

            <!-- Input Area -->
            <div class="bg-gray-800 p-4 border-t border-gray-700 shadow-lg pb-safe">
                <form id="chat-form" class="flex gap-2 max-w-4xl mx-auto">
                    <button type="button" id="btn-skip" class="bg-red-900/50 hover:bg-red-800/80 text-red-200 border border-red-700 p-3 rounded-xl transition-colors duration-200 flex-shrink-0 group relative" title="Skip to next person">
                        <i class="fa-solid fa-forward-step"></i>
                    </button>
                    <input type="text" id="chat-input" placeholder="Type a message..." class="flex-1 bg-gray-900 border border-gray-700 text-white rounded-xl px-4 py-3 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all placeholder-gray-500" autocomplete="off" maxlength="500">
                    <button type="submit" id="btn-send" class="bg-blue-600 hover:bg-blue-500 text-white p-3 rounded-xl transition-colors duration-200 flex-shrink-0 disabled:opacity-50 disabled:cursor-not-allowed">
                        <i class="fa-solid fa-paper-plane"></i>
                    </button>
                </form>
            </div>
        </div>

    </main>

    <script src="script.js"></script>
</body>
</html>
